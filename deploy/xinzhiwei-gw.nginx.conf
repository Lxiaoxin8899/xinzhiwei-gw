server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name aitx.xin;

    ssl_certificate /etc/letsencrypt/live/aitx.xin/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aitx.xin/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.aitx.xin;
    ssl_certificate /etc/letsencrypt/live/aitx.xin/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aitx.xin/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://aitx.xin$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name aitx.xin;
    return 301 https://aitx.xin$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.aitx.xin;
    return 301 https://aitx.xin$request_uri;
}
